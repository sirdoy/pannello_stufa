<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pannello Stufa — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0a0908; min-height: 100vh; overscroll-behavior: none; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #f5f5f4;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
    background:
      radial-gradient(circle at 20% 20%, #1a0f08 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, #0a0f1a 0%, transparent 50%),
      #070606;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  input[type="range"] { accent-color: #ed6f10; }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 999px; background: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4); cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 999px; background: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4); cursor: pointer; border: none;
  }

  /* Hide scrollbar inside frame */
  ::-webkit-scrollbar { width: 0; height: 0; }

  @keyframes flamePulse {
    0%, 100% { transform: translateX(-50%) scaleY(1); opacity: 1; }
    50% { transform: translateX(-50%) scaleY(1.08) scaleX(0.96); opacity: 0.92; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes ambientA {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(40px, 30px) scale(1.15); }
  }
  @keyframes ambientB {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-30px, -40px) scale(1.1); }
  }
  @keyframes ambientC {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
    50% { transform: translate(20px, -20px) scale(1.2); opacity: 0.6; }
  }
  @keyframes sonosBar0 {
    0%, 100% { height: 3px; } 50% { height: 9px; }
  }
  @keyframes sonosBar1 {
    0%, 100% { height: 7px; } 50% { height: 2px; }
  }
  @keyframes sonosBar2 {
    0%, 100% { height: 4px; } 50% { height: 8px; }
  }

  @page { size: A4 portrait; margin: 1cm; }
  @media print {
    html, body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    body {
      padding: 0 !important;
      min-height: auto !important;
      display: block !important;
      background: #070606 !important;
    }
    #root { display: flex; align-items: center; justify-content: center; }
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/cards.jsx"></script>
<script type="text/babel" src="components/sheets.jsx"></script>
<script type="text/babel" src="components/app.jsx"></script>

<script type="text/babel">
  function Root() {
    return (
      <IOSDevice dark={true}>
        <div style={{ position: 'absolute', inset: 0 }}>
          <App />
        </div>
      </IOSDevice>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  (async () => {
    try { await document.fonts.ready; } catch (e) {}
    setTimeout(() => window.print(), 800);
  })();
</script>

</body>
</html>
